name: Build RPM Package

on:
  workflow_dispatch:
    inputs:
      miniforge_version:
        description: 'Miniforge version (e.g., 24.7.1-0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: centos:7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install build dependencies
        run: |
          yum -y install epel-release
          yum -y install rpm-build rpmdevtools tar gzip wget which sed

      - name: Download Miniforge
        run: |
          MINIFORGE_VERSION=${{ inputs.miniforge_version }}
          wget -q "https://github.com/conda-forge/miniforge/releases/download/${MINIFORGE_VERSION}/Miniforge3-${MINIFORGE_VERSION}-Linux-x86_64.sh" -O miniforge.sh

      - name: Install Miniforge
        run: |
          chmod +x miniforge.sh
          ./miniforge.sh -b -p /usr/local/miniforge3
          rm miniforge.sh

      - name: Verify installation
        run: |
          /usr/local/miniforge3/bin/python --version

      - name: Install Python dependencies from requirements.txt
        run: |
          /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
          /usr/local/miniforge3/bin/pip install --no-build-isolation -r requirements.txt

      - name: Get Python version
        run: |
          /usr/local/miniforge3/bin/python -c "import sys; print(sys.version.split()[0])" > /tmp/pyver.txt

      - name: Prepare RPM build environment
        run: |
          mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

      - name: Create source tarball
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          cd /usr/local
          tar czf /github/home/.rpmbuild/SOURCES/miniforge3-${RPM_VERSION}.tar.gz miniforge3

      - name: Prepare spec file
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          sed "s/@VERSION@/$RPM_VERSION/" miniforge3.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

      - name: Build RPM
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          TOPDIR=/github/home/.rpmbuild
          rpmbuild -bb $TOPDIR/SPECS/miniforge3.spec --define "_topdir $TOPDIR"

      - name: List RPM files
        run: |
          find /github/home/.rpmbuild -name "*.rpm" -type f

      - name: Create release body
        run: |
          VERSION="${{ inputs.miniforge_version }}"
          RPM_VERSION=$(echo "$VERSION" | tr '-' '_')

          # Get Python version
          PYVERFILE=/tmp/python_version.txt
          /usr/local/miniforge3/bin/python -c "import sys; print(sys.version.split()[0])" > $PYVERFILE
          PYVER="$(cat $PYVERFILE)"

          # Get installed packages via pip freeze
          /usr/local/miniforge3/bin/pip freeze > /tmp/pip_freeze.txt

          # Create table - filter out @ file:// lines and keep only proper packages
          echo '| Package | Version |' > /tmp/tbl.md
          echo '|---------|---------|' >> /tmp/tbl.md
          grep -v '^#' /tmp/pip_freeze.txt | grep -v '^$' | grep -v '@ file://' | grep '==' | while read line; do
            echo "| $line |" | sed 's/==/|/g' >> /tmp/tbl.md
          done

          # Build full release
          {
            echo "# Miniforge3 RPM $VERSION"
            echo ""
            echo "## Environment"
            echo "- Miniforge: $VERSION"
            echo "- Python: $PYVER"
            echo "- Installation: /usr/local/miniforge3"
            echo "- Platform: CentOS 7 (glibc 2.17)"
            echo ""
            echo "## Installed Packages"
            echo ""
            cat /tmp/tbl.md
            echo ""
            echo "## Installation"
            echo '```'
            echo "sudo rpm -ivh miniforge3-${RPM_VERSION}-1.el7.x86_64.rpm"
            echo '```'
            echo ""
            echo '```'
            echo "sudo yum localinstall miniforge3-${RPM_VERSION}-1.el7.x86_64.rpm"
            echo '```'
          } > /tmp/release_body.txt

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-${{ inputs.miniforge_version }}
          release_name: Miniforge3 RPM ${{ inputs.miniforge_version }}
          files: |
            /github/home/.rpmbuild/RPMS/**/*.rpm
            /github/home/.rpmbuild/SOURCES/*.tar.gz
          body_path: /tmp/release_body.txt