name: Build RPM Package

on:
  workflow_dispatch:
    inputs:
      miniforge_version:
        description: 'Miniforge version (e.g., 24.7.1-0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    env:
      MANYLINUX_IMAGE: quay.io/pypa/manylinux2014_x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build RPM
        run: |
          docker run \
            -v.:/miniforge \
            -e MINIFORGE_VERSION=${{ inputs.miniforge_version }} \
            ${{ env.MANYLINUX_IMAGE }} \
            bash -c "
              set -e
              cat /etc/os-release

              # Replace CentOS 7 repositories with archived mirrors (EOL fix)
              sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-*
              sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*

              # Install build dependencies
              yum -y install epel-release
              yum -y install rpm-build rpmdevtools tar gzip wget which sed

              # Download Miniforge
              wget -q \"https://github.com/conda-forge/miniforge/releases/download/\${MINIFORGE_VERSION}/Miniforge3-\${MINIFORGE_VERSION}-Linux-x86_64.sh\" -O miniforge.sh

              # Install Miniforge
              chmod +x miniforge.sh
              ./miniforge.sh -b -p /usr/local/miniforge3
              rm miniforge.sh

              # Verify installation
              /usr/local/miniforge3/bin/python --version

              # Install Python dependencies from requirements.txt
              # Install numpy first (required by matplotlib and other packages)
              /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
              /usr/local/miniforge3/bin/pip install numpy
              /usr/local/miniforge3/bin/pip install --no-build-isolation -r /miniforge/requirements.txt

              # Get Python version
              /usr/local/miniforge3/bin/python -c \"import sys; print(sys.version.split()[0])\" > /tmp/pyver.txt

              # Prepare RPM build environment
              mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

              # Create source tarball
              RPM_VERSION=\$(echo \"\${MINIFORGE_VERSION}\" | tr '-' '_')
              cd /usr/local
              tar czf /github/home/.rpmbuild/SOURCES/miniforge3-\${RPM_VERSION}.tar.gz miniforge3

              # Prepare spec file
              sed \"s/@VERSION@/\${RPM_VERSION}/\" /miniforge/miniforge3.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

              # Build RPM
              TOPDIR=/github/home/.rpmbuild
              rpmbuild -bb \$TOPDIR/SPECS/miniforge3.spec --define \"_topdir \$TOPDIR\"

              # List RPM files
              find /github/home/.rpmbuild -name \"*.rpm\" -type f

              # Create release body
              PYVER=\$(cat /tmp/pyver.txt)
              /usr/local/miniforge3/bin/pip freeze > /tmp/pip_freeze.txt

              echo '| Package | Version |' > /tmp/tbl.md
              echo '|---------|---------|' >> /tmp/tbl.md
              grep -v '^#' /tmp/pip_freeze.txt | grep -v '^$' | grep -v '@ file://' | grep '==' | while read line; do
                echo \"| \$line |\" | sed 's/==/|/g' >> /tmp/tbl.md
              done

              {
                echo \"# Miniforge3 RPM \${MINIFORGE_VERSION}\"
                echo \"\"
                echo \"## Environment\"
                echo \"- Miniforge: \${MINIFORGE_VERSION}\"
                echo \"- Python: \$PYVER\"
                echo \"- Installation: /usr/local/miniforge3\"
                echo \"- Platform: CentOS 7 (glibc 2.17)\"
                echo \"\"
                echo \"## Installed Packages\"
                echo \"\"
                cat /tmp/tbl.md
                echo \"\"
                echo \"## Installation\"
                echo '\`\`\`'\"
                echo \"sudo rpm -ivh miniforge3-\${RPM_VERSION}-1.el7.x86_64.rpm\"
                echo '\`\`\`'\"
                echo \"\"
                echo '\`\`\`'\"
                echo \"sudo yum localinstall miniforge3-\${RPM_VERSION}-1.el7.x86_64.rpm\"
                echo '\`\`\`'\"
              } > /tmp/release_body.txt

              # Upload to Release
              cd /github/home/.rpmbuild
              echo \"Upload files:\"
              ls -la RPMS/**/*.rpm SOURCES/*.tar.gz
            "

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-${{ inputs.miniforge_version }}
          release_name: Miniforge3 RPM ${{ inputs.miniforge_version }}
          files: |
            /github/home/.rpmbuild/RPMS/**/*.rpm
            /github/home/.rpmbuild/SOURCES/*.tar.gz
          body_path: /tmp/release_body.txt