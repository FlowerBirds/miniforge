name: Build RPM Package (Rocky Linux 8)

on:
  workflow_dispatch:
    inputs:
      miniforge_version:
        description: 'Miniforge version (e.g., 24.7.1-0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    env:
      MANYLINUX_IMAGE: quay.io/pypa/manylinux2014_x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build RPM in Docker
        run: |
          mkdir -p /tmp/rpmbuild/{RPMS,SOURCES}

          docker run \
            -v /tmp/rpmbuild:/output \
            -v.:/miniforge \
            -e MINIFORGE_VERSION=${{ inputs.miniforge_version }} \
            ${{ env.MANYLINUX_IMAGE }} \
            bash -c "
              set -e

              # Install build dependencies
              yum -y install dnf-plugins-core rpm-build rpmdevtools tar gzip wget which sed

              # Download Miniforge
              wget -q \"https://github.com/conda-forge/miniforge/releases/download/\${MINIFORGE_VERSION}/Miniforge3-\${MINIFORGE_VERSION}-Linux-x86_64.sh\" -O miniforge.sh

              # Install Miniforge
              chmod +x miniforge.sh
              ./miniforge.sh -b -p /usr/local/miniforge3
              rm miniforge.sh

              # Verify installation
              /usr/local/miniforge3/bin/python --version

              # Install Python dependencies from requirements.txt
              /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
              /usr/local/miniforge3/bin/pip install --prefer-binary -r /miniforge/requirements.txt

              # Get Python version
              /usr/local/miniforge3/bin/python -c \"import sys; print(sys.version.split()[0])\" > /tmp/pyver.txt

              # Prepare RPM build environment
              mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

              # Create source tarball
              RPM_VERSION=\$(echo \"\${MINIFORGE_VERSION}\" | tr '-' '_')
              cd /usr/local
              tar czf /github/home/.rpmbuild/SOURCES/miniforge3-\${RPM_VERSION}.tar.gz miniforge3

              # Prepare spec file
              sed \"s/@VERSION@/\${RPM_VERSION}/\" /miniforge/miniforge3.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

              # Build RPM
              TOPDIR=/github/home/.rpmbuild
              rpmbuild -bb \$TOPDIR/SPECS/miniforge3.spec --define \"_topdir \$TOPDIR\"

              # Copy RPM files to output
              cp /github/home/.rpmbuild/RPMS/x86_64/*.rpm /output/RPMS/
              cp /github/home/.rpmbuild/SOURCES/*.tar.gz /output/SOURCES/

              # Get installed packages via pip freeze
              /usr/local/miniforge3/bin/pip freeze > /tmp/pip_freeze.txt
              cp /tmp/pip_freeze.txt /output/pip_freeze.txt
              cp /tmp/pyver.txt /output/pyver.txt
            "

      - name: Create package table
        run: |
          echo '| Package | Version |' > /tmp/tbl.md
          echo '|---------|---------|' >> /tmp/tbl.md
          grep -v '^#' /tmp/rpmbuild/pip_freeze.txt | grep -v '^$' | grep -v '@ file://' | grep '==' | while read line; do
            echo "| $line |" | sed 's/==/|/g' >> /tmp/tbl.md
          done

      - name: Create release body
        run: |
          VERSION="${{ inputs.miniforge_version }}"
          RPM_VERSION=$(echo "$VERSION" | tr '-' '_')
          PYVER=$(cat /tmp/rpmbuild/pyver.txt)

          {
            echo "# Miniforge3 RPM (Rocky Linux 8) ${VERSION}"
            echo ""
            echo "## Environment"
            echo "- Miniforge: ${VERSION}"
            echo "- Python: ${PYVER}"
            echo "- Installation: /usr/local/miniforge3"
            echo "- Platform: Rocky Linux 8 x86_64"
            echo ""
            echo "## Installed Packages"
            echo ""
            cat /tmp/tbl.md
            echo ""
            echo "## Installation"
            echo '```'
            echo "sudo rpm -ivh miniforge3-${RPM_VERSION}-1.el8.x86_64.rpm"
            echo '```'
            echo ""
            echo '```'
            echo "sudo dnf localinstall miniforge3-${RPM_VERSION}-1.el8.x86_64.rpm"
            echo '```'
          } > /tmp/rpmbuild/release_body.txt

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-rocky8-${{ inputs.miniforge_version }}
          release_name: Miniforge3 RPM (Rocky Linux 8) ${{ inputs.miniforge_version }}
          files: |
            /tmp/rpmbuild/RPMS/*.rpm
            /tmp/rpmbuild/SOURCES/*.tar.gz
          body_path: /tmp/rpmbuild/release_body.txt