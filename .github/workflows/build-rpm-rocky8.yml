name: Build RPM Package (Rocky Linux 8)

on:
  workflow_dispatch:
    inputs:
      miniforge_version:
        description: 'Miniforge version (e.g., 24.7.1-0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: rockylinux:8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install dnf-plugins-core rpm-build rpmdevtools tar gzip wget which sed

      - name: Download Miniforge
        run: |
          MINIFORGE_VERSION=${{ inputs.miniforge_version }}
          wget -q "https://github.com/conda-forge/miniforge/releases/download/${MINIFORGE_VERSION}/Miniforge3-${MINIFORGE_VERSION}-Linux-x86_64.sh" -O miniforge.sh

      - name: Install Miniforge
        run: |
          chmod +x miniforge.sh
          ./miniforge.sh -b -p /usr/local/miniforge3
          rm miniforge.sh

      - name: Verify installation
        run: |
          /usr/local/miniforge3/bin/python --version

      - name: Install Python dependencies from requirements.txt
        run: |
          /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
          /usr/local/miniforge3/bin/pip install --no-build-isolation -r requirements.txt

      - name: Get Python version and packages info
        id: python-info
        run: |
          /usr/local/miniforge3/bin/pip freeze | sed 's/==/|/g' > /tmp/packages.txt
          echo "python_version=$(/usr/local/miniforge3/bin/python --version)" >> $GITHUB_OUTPUT

      - name: Prepare RPM build environment
        run: |
          mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

      - name: Create source tarball
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          cd /usr/local
          tar czf /github/home/.rpmbuild/SOURCES/miniforge3-${RPM_VERSION}.tar.gz miniforge3

      - name: Prepare spec file
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          sed "s/@VERSION@/$RPM_VERSION/" miniforge3.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

      - name: Build RPM
        env:
          MINIFORGE_VERSION: ${{ inputs.miniforge_version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          TOPDIR=/github/home/.rpmbuild
          rpmbuild -bb $TOPDIR/SPECS/miniforge3.spec --define "_topdir $TOPDIR"

      - name: List RPM files
        run: |
          find /github/home/.rpmbuild -name "*.rpm" -type f

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge3-rpm-rocky8-${{ inputs.miniforge_version }}
          path: /github/home/.rpmbuild/RPMS/**/*.rpm
          retention-days: 5

      - name: Generate release body
        run: |
          PACKAGES=$(cat /tmp/packages.txt | tr '\n' ' ')

          cat > /tmp/release_body.txt << 'RELEASE_EOF'
Miniforge3 RPM package built from version MINIFORGE_VERSION_PLACEHOLDER for Rocky Linux 8

## Environment
- **Miniforge:** MINIFORGE_VERSION_PLACEHOLDER
- **Python:** PYTHON_VERSION_PLACEHOLDER
- **Installation:** `/usr/local/miniforge3`

## Installed Packages

| Package | Version |
|---------|---------|
PACKAGES_PLACEHOLDER

## Installation

```bash
sudo rpm -ivh miniforge3-MINIFORGE_VERSION_PLACEHOLDER-1.el8.x86_64.rpm
```

Or install from local file:
```bash
sudo dnf localinstall miniforge3-MINIFORGE_VERSION_PLACEHOLDER-1.el8.x86_64.rpm
```
RELEASE_EOF

          sed -i "s/MINIFORGE_VERSION_PLACEHOLDER/${{ inputs.miniforge_version }}/g" /tmp/release_body.txt
          sed -i "s/PYTHON_VERSION_PLACEHOLDER/${{ steps.python-info.outputs.python_version }}/g" /tmp/release_body.txt
          sed -i "s/PACKAGES_PLACEHOLDER/$PACKAGES/g" /tmp/release_body.txt

          BODY=$(cat /tmp/release_body.txt | base64 -w 0)
          echo "body=$BODY" >> $GITHUB_OUTPUT

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-rocky8-${{ inputs.miniforge_version }}
          release_name: Miniforge3 RPM (Rocky Linux 8) ${{ inputs.miniforge_version }}
          files: |
            /github/home/.rpmbuild/RPMS/**/*.rpm
            /github/home/.rpmbuild/SOURCES/*.tar.gz
          body: ${{ fromJson(steps.generate-release-body.outputs.body) }}