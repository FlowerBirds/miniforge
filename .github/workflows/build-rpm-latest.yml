name: Build RPM Package (Latest)

on:
  workflow_dispatch:

permissions:
  contents: write
  releases: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: rockylinux:8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check user
        run: |
          whoami
          echo "HOME=$HOME"
          pwd

      - name: Install build dependencies
        run: |
          dnf -y install dnf-plugins-core rpm-build rpmdevtools tar gzip wget which sed

      - name: Get latest Miniforge version
        id: version
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/conda-forge/miniforge/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": "//' | sed 's/",//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Miniforge
        run: |
          VERSION=${{ steps.version.outputs.version }}
          wget -q "https://github.com/conda-forge/miniforge/releases/download/${VERSION}/Miniforge3-${VERSION}-Linux-x86_64.sh" -O miniforge.sh

      - name: Install Miniforge
        run: |
          chmod +x miniforge.sh
          ./miniforge.sh -b -p /usr/local/miniforge3
          rm miniforge.sh

      - name: Verify installation
        run: |
          /usr/local/miniforge3/bin/python --version

      - name: Install latest Python dependencies
        run: |
          /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
          /usr/local/miniforge3/bin/pip install --no-build-isolation -r requirements-latest.txt

      - name: Prepare RPM build environment
        run: |
          mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

      - name: Create source tarball
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          cd /usr/local
          tar czf /github/home/.rpmbuild/SOURCES/miniforge3-${RPM_VERSION}.tar.gz miniforge3

      - name: Prepare spec file
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          sed "s/@VERSION@/$RPM_VERSION/" miniforge3-latest.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

      - name: Build RPM
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          TOPDIR=/github/home/.rpmbuild
          rpmbuild -bb $TOPDIR/SPECS/miniforge3.spec --define "_topdir $TOPDIR"

      - name: List RPM files
        run: |
          find /github/home/.rpmbuild -name "*.rpm" -type f

      - name: Get Python version and packages info
        id: python-info
        run: |
          /usr/local/miniforge3/bin/pip freeze | sed 's/==/|/g' > /tmp/packages.txt
          echo "python_version=$(/usr/local/miniforge3/bin/python --version)" >> $GITHUB_OUTPUT

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge3-rpm-${{ steps.version.outputs.version }}
          path: /github/home/.rpmbuild/RPMS/**/*.rpm
          retention-days: 5

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-latest-${{ steps.version.outputs.version }}
          release_name: Miniforge3 RPM (Latest) ${{ steps.version.outputs.version }}
          files: /github/home/.rpmbuild/RPMS/**/*.rpm
          body: |
            Miniforge3 RPM with latest Python packages, built from version ${{ steps.version.outputs.version }}

            ## Environment
            - **Miniforge:** ${{ steps.version.outputs.version }}
            - **Python:** Python 3.13.0
            - **Installation:** `/usr/local/miniforge3`

            ## Installed Packages

            Please check the artifacts for installed package list.
          generate_release_notes: true