name: Build RPM Package (Latest)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: rockylinux:8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install dnf-plugins-core rpm-build rpmdevtools tar gzip wget which sed

      - name: Get latest Miniforge version
        id: version
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/conda-forge/miniforge/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": "//' | sed 's/",//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Miniforge
        run: |
          wget -q "https://github.com/conda-forge/miniforge/releases/download/${{ steps.version.outputs.version }}/Miniforge3-${{ steps.version.outputs.version }}-Linux-x86_64.sh" -O miniforge.sh

      - name: Install Miniforge
        run: |
          chmod +x miniforge.sh
          ./miniforge.sh -b -p /usr/local/miniforge3
          rm miniforge.sh

      - name: Verify installation
        run: |
          /usr/local/miniforge3/bin/python --version

      # - name: Install latest Python dependencies
      #   run: |
      #     /usr/local/miniforge3/bin/pip install --upgrade pip setuptools wheel
      #     /usr/local/miniforge3/bin/pip install --no-build-isolation -r requirements-latest.txt

      - name: Get Python version
        run: |
          /usr/local/miniforge3/bin/python -c "import sys; print(sys.version.split()[0])" > /tmp/pyver.txt
          PYVER=$(cat /tmp/pyver.txt)
          echo "python_version=$PYVER" >> $GITHUB_OUTPUT

      - name: Prepare RPM build environment
        run: |
          mkdir -p /github/home/.rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}

      - name: Create source tarball
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          cd /usr/local
          tar czf /github/home/.rpmbuild/SOURCES/miniforge3-${RPM_VERSION}.tar.gz miniforge3

      - name: Prepare spec file
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          sed "s/@VERSION@/$RPM_VERSION/" miniforge3-latest.spec > /github/home/.rpmbuild/SPECS/miniforge3.spec

      - name: Build RPM
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          RPM_VERSION=$(echo "$MINIFORGE_VERSION" | tr '-' '_')
          TOPDIR=/github/home/.rpmbuild
          rpmbuild -bb $TOPDIR/SPECS/miniforge3.spec --define "_topdir $TOPDIR"

      - name: List RPM files
        run: |
          find /github/home/.rpmbuild -name "*.rpm" -type f

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge3-rpm-${{ steps.version.outputs.version }}
          path: /github/home/.rpmbuild/RPMS/**/*.rpm
          retention-days: 5

      - name: Create release body
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get Python version safely
          PYVERFILE=/tmp/python_version.txt
          /usr/local/miniforge3/bin/python -c "import sys; print(sys.version.split()[0])" > $PYVERFILE
          PYVER="$(cat $PYVERFILE)"

          # Get installed packages via pip freeze
          /usr/local/miniforge3/bin/pip freeze > /tmp/pip_freeze.txt

          # Create table
          echo '| Package | Version |' > /tmp/tbl.md
          echo '|---------|---------|' >> /tmp/tbl.md
          grep -v '^#' /tmp/pip_freeze.txt | grep -v '^$' | sed 's/==/|/g' | while read line; do
            echo "| $line |" >> /tmp/tbl.md
          done

          # Build full release
          {
            echo "# Miniforge3 RPM (Latest) $VERSION"
            echo ""
            echo "## Environment"
            echo "- Miniforge: $VERSION"
            echo "- Python: $PYVER"
            echo "- Installation: /usr/local/miniforge3"
            echo ""
            echo "## Installed Packages"
            echo ""
            cat /tmp/tbl.md
            echo ""
            echo "## Installation"
            echo '```'
            echo "sudo rpm -ivh miniforge3-$VERSION-1.el8.x86_64.rpm"
            echo '```'
            echo ""
            echo '```'
            echo "sudo dnf localinstall miniforge3-$VERSION-1.el8.x86_64.rpm"
            echo '```'
          } > /tmp/release_body.txt

          cat /tmp/release_body.txt

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-latest-${{ steps.version.outputs.version }}
          release_name: Miniforge3 RPM (Latest) ${{ steps.version.outputs.version }}
          files: |
            /github/home/.rpmbuild/RPMS/**/*.rpm
            /github/home/.rpmbuild/SOURCES/*.tar.gz
          body_path: /tmp/release_body.txt