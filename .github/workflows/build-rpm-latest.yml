name: Build RPM Package (Latest)

on:
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: rockylinux:8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install dnf-plugins-core rpm-build rpmdevtools tar gzip wget which sed

      - name: Get latest Miniforge version
        id: version
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/conda-forge/miniforge/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": "//' | sed 's/",//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Downloading Miniforge version: $VERSION"

      - name: Download Miniforge
        run: |
          wget -q "https://github.com/conda-forge/miniforge/releases/download/${{ steps.version.outputs.version }}/Miniforge3-${{ steps.version.outputs.version }}-Linux-x86_64.sh" -O miniforge.sh

      - name: Install Miniforge
        run: |
          chmod +x miniforge.sh
          ./miniforge.sh -b -p /usr/local/miniforge3-latest
          rm miniforge.sh

      - name: Verify installation
        run: |
          ls -la /usr/local/miniforge3-latest/
          /usr/local/miniforge3-latest/bin/python --version

      - name: Install latest Python dependencies
        run: |
          /usr/local/miniforge3-latest/bin/pip install --upgrade pip
          /usr/local/miniforge3-latest/bin/pip install -r requirements-latest.txt

      - name: Prepare RPM build environment
        run: |
          rpmdev-setuptree

      - name: Copy Miniforge to RPM build root
        run: |
          mkdir -p ~/rpmbuild/BUILDROOT
          mkdir -p ~/rpmbuild/SOURCES/miniforge3-latest-${{ steps.version.outputs.version }}
          cp -r /usr/local/miniforge3-latest/* ~/rpmbuild/SOURCES/miniforge3-latest-${{ steps.version.outputs.version }}/

      - name: Create spec file
        env:
          MINIFORGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          printf '%%global version %s\n' "$MINIFORGE_VERSION" > ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Name:           miniforge3-latest\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Version:        %%{version}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Release:        1%%{?dist}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Summary:        Miniforge3 (Latest) with latest Python packages\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'License:        BSD-3-Clause\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'URL:            https://github.com/conda-forge/miniforge\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Source0:        miniforge3-latest-%%{version}.tar.gz\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%description\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'Miniforge3 Latest is a minimal installer for conda-forge that provides\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'the latest Python packages from requirements-latest.txt.\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%global __os_install_post /usr/lib/rpm/brp-compress %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%global _bytecompile 0\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%global __debugedit %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%global __python_bytecompile %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define __objdump /bin/true\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define _without_check 1\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define _binaries_in_noarch_packages_terminate_build 0\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define _use_internal_dependency_generator 0\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define debug_package %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define __find_requires %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%define __find_provides %%{nil}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%prep\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'mkdir -p miniforge3-latest-%%{version}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'cd miniforge3-latest-%%{version}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%build\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '# No compile needed\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%install\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'rm -rf %%{buildroot}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'mkdir -p %%{buildroot}/usr/local/miniforge3-latest\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'cp -r %%{_builddir}/miniforge3-latest-%%{version}/* %%{buildroot}/usr/local/miniforge3-latest/\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%clean\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'rm -rf %%{buildroot}\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%files\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '/usr/local/miniforge3-latest/*\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%post\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf 'chmod -R 755 /usr/local/miniforge3-latest\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '%%%%changelog\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '* Tue Apr 28 2026 Build <build@example.com> %%{version}-1\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '- Auto-built RPM with latest Python packages\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          printf '- Installed to /usr/local/miniforge3-latest\n' >> ~/rpmbuild/SPECS/miniforge3-latest.spec
          cat ~/rpmbuild/SPECS/miniforge3-latest.spec

      - name: Build RPM
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/miniforge3-latest.spec \
            --define "_topdir /home/runner/rpmbuild"

      - name: List RPM files
        run: |
          find ~/rpmbuild -name "*.rpm" -type f

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniforge3-latest-rpm-${{ steps.version.outputs.version }}
          path: ~/rpmbuild/RPMS/**/*.rpm
          retention-days: 5

      - name: Get token for release
        id: get-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rpm-latest-${{ steps.version.outputs.version }}
          release_name: Miniforge3 RPM (Latest) ${{ steps.version.outputs.version }}
          files: ~/rpmbuild/RPMS/**/*.rpm
          body: |
            Miniforge3 RPM with latest Python packages, built from version ${{ steps.version.outputs.version }}

            Installation path: `/usr/local/miniforge3-latest`

            Installation:
            ```bash
            sudo rpm -ivh miniforge3-latest-${{ steps.version.outputs.version }}-1.el8.x86_64.rpm
            ```

            Or install from local file:
            ```bash
            sudo dnf localinstall miniforge3-latest-${{ steps.version.outputs.version }}-1.el8.x86_64.rpm
            ```
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
